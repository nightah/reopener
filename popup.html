<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
<link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img src="icons/icon48.svg" class="header-icon" alt="">
      <span class="header-title">Reopener</span>
    </div>
    <div class="header-actions">
      <button id="btn-clear" class="icon-btn" title="Clear history" aria-label="Clear history">
        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
          <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
      </button>
      <button id="btn-settings" class="icon-btn" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
          <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="search-bar">
    <div class="search-pill">
      <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor" width="15" height="15">
        <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
      </svg>
      <input id="search" type="text" placeholder="Search closed tabs..." autocomplete="off" spellcheck="false">
      <span id="count" class="count"></span>
    </div>
  </div>

  <div id="results" role="list"></div>

  <div id="empty" class="empty hidden">No closed tabs yet.</div>

  <div id="context-menu" class="popup-menu hidden" role="menu">
    <button id="ctx-open" role="menuitem">Open</button>
    <button id="ctx-delete" role="menuitem" class="danger">Delete</button>
  </div>

  <div id="clear-menu" class="popup-menu hidden" role="menu">
    <button id="clear-searched" role="menuitem">Clear searched history</button>
    <button id="clear-recent" role="menuitem">Clear recent…</button>
    <div id="clear-recent-form" class="menu-form hidden">
      <input type="number" id="clear-minutes" min="1" max="99999" value="5">
      <span class="menu-form-unit">min</span>
      <button id="clear-recent-go">Clear</button>
    </div>
    <button id="clear-all" role="menuitem" class="danger">Clear all history</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
