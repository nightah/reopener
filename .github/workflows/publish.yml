name: Publish to Firefox Add-ons

# Triggers on a version tag push (e.g. git tag v1.0.1 && git push --tags)
# or can be kicked off manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the GitHub release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Stamp the manifest version to match the git tag (v1.2.3 → 1.2.3)
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" manifest.json
          echo "Publishing version $VERSION"

      - name: Install web-ext
        run: npm install --global web-ext

      # Build a clean zip that excludes repo-only files
      - name: Build extension zip
        run: |
          web-ext build \
            --source-dir . \
            --artifacts-dir artifacts \
            --ignore-files \
              "screenshots/**" \
              "README.md" \
              "LICENSE" \
              ".gitignore" \
              ".github/**" \
              "artifacts/**"

      # Submit to AMO for review.
      # Secrets to add in Settings → Secrets → Actions:
      #   AMO_JWT_ISSUER  — "JWT issuer" from https://addons.mozilla.org/developers/addon/api/key/
      #   AMO_JWT_SECRET  — "JWT secret" from the same page
      - name: Submit to AMO
        run: |
          cat > amo-metadata.json << 'EOF'
          {
            "name": {"en-US": "Reopener"},
            "summary": {"en-US": "Tracks every tab you close and lets you find and restore them instantly with fuzzy search by title or URL."},
            "categories": {"firefox": ["tabs"]},
            "version": {"license": "MIT"}
          }
          EOF
          web-ext sign \
            --source-dir . \
            --artifacts-dir artifacts \
            --ignore-files \
              "screenshots/**" \
              "README.md" \
              "LICENSE" \
              ".gitignore" \
              ".github/**" \
              "artifacts/**" \
              "amo-metadata.json" \
            --amo-metadata amo-metadata.json \
            --api-key "${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret "${{ secrets.AMO_JWT_SECRET }}" \
            --channel listed
        # web-ext sign --channel=listed submits the extension for Mozilla's
        # review queue. The step completes once the submission is accepted by
        # the API — the actual review by Mozilla staff happens asynchronously.

      # Create a GitHub release and attach the zip so people can sideload too
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
